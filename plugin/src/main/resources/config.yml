# MC-Market: https://www.mc-market.org/resources/20395/
# GitHub: https://github.com/ShieldCommunity/SternalBoard
#
# If you have any problem, contact us in discord or report issue in GitHub section
# Issues: https://github.com/ShieldCommunity/SternalBoard/issues

settings:
  # Select scoreboard mode: NORMAL, WORLD, PERMISSION, ANIMATED and WORLDGUARD
  #
  # NORMAL - Default scoreboard shown
  # WORLD - Per world-based scoreboard
  # PERMISSION - Per permission based scoreboard
  # WORLDGUARD - Per region-based scoreboard
  # ANIMATED - Animates frames for scoreboard
  mode: NORMAL
  scoreboard-interval-update: 20
  scoreboard:
    title: '&b&lSternal&f&lBoard'
    lines:
      - '&8&m+-------------------+'
      - ''
      - '&a&lâ–Ľ &bData:'
      - '&fâ—Ź &7Nick: &b%player_name%'
      - '&fâ—Ź &7Rank: &b%vault_rank%'
      - '&fâ—Ź &7Coins: &e%vault_eco_balance_formatted%'
      - ''
      - '&a&lâ–Ľ &bExample:'
      - '&fâ—Ź &7Lobby: &b#1'
      - '&fâ—Ź &7Ping: &b%player_ping%'
      - '&fâ—Ź &7Players: &b%bungee_total%'
      - ''
      - '&fâ—Ź &fIP: &bplay.yournetwork.com'

  #Option to disable some scoreboards from worlds
  world-blacklist:
    enabled: true
    worlds:
      - "your-world"
      - "your-world2"

#
# Tab-list system configuration
#
# Supports PlaceholderAPI
tab-list:
  enabled: false
  update-interval: 20
  header:
    - "&eShield&6Community &7| &aTest server"
    - "Do you like the plugin? Give a review!"
  footer:
    - "&6Download it now!"
    - "&fAvailable on SpigotMC"
